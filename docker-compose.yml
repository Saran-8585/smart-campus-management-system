services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/smart_campus
      - JWT_SECRET=smart_campus_jwt_secret_key_2024
      - PORT=5000
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  seed:
    build: ./backend
    command: node db/seed.js
    environment:
      - MONGO_URI=mongodb://mongo:27017/smart_campus
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

volumes:
  mongo-data:
